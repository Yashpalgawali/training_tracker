
server.servlet.context-path=/trainingtrackerrest
server.address=0.0.0.0
server.port=8282

spring.application.name=trainingtracker
spring.profiles.active=prod
spring.config.import=configserver:http://192.168.0.219:8081/trainingtrackerconfigserver/
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-interval=5000
spring.cloud.config.retry.max-attempts=20
spring.cloud.config.retry.multiplier=1.5

spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.host=smtp.gmail.com
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
#spring.mail.username=${SMTP_USER}
#spring.mail.password=${SMTP_PASS}
 spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

#Localhost
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3399/employeeperformancetracker?useSSL=false&serverTimezone=UTC&autoReconnect=true&failOverReadOnly=false&maxReconnects=10}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#Turn Statistics on
#spring.jpa.properties.hibernate.generate_statistics=true
#logging.level.org.hibernate.stat=debug

spring.jpa.hibernate.ddl-auto=update

# Show all queries
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.type=trace
spring.jpa.properties.hibernate.connection.isolation=2

# Performance
# JDBC batch size – improves INSERT performance for bulk uploads
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

#spring.main.allow-circular-references=true

# when the application is idle then needed to restart tomcat , with following no restart is needed 
# HikariCP – keep connections alive and prevent MySQL 'server gone away' on long uploads
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
# idle-timeout: how long an idle connection can sit in the pool before being evicted (ms)
spring.datasource.hikari.idle-timeout=300000
# max-lifetime: maximum lifetime of a connection in the pool; must be < MySQL wait_timeout
spring.datasource.hikari.max-lifetime=1800000
# keepalive-time: send a ping to keep the connection alive (prevents server gone away)
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.mvc.pathmatch.matching-strategy=ant-path-matcher

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── CI3 (CodeIgniter 3) cPanel Sync Configuration ──────────────────────────
# Replace the dummy values below with your real cPanel-hosted CI3 application details.

# Full URL of the CI3 REST endpoint that returns the employee JSON array
# Example: https://yourcompany.com/ci3app/api/employees
ci3.api.url=https://dummy-cpanel-ci3.example.com/api/employees

# Basic Auth credentials for the CI3 API
# Set CI3_API_USERNAME and CI3_API_PASSWORD as environment variables on the server.
# Never put real credentials directly in this file.
ci3.api.username=${CI3_API_USERNAME:ci3_api_user}
ci3.api.password=${CI3_API_PASSWORD:ci3_api_password}

# Cron expression for the nightly scheduled sync
# Default: every day at midnight (0 0 0 * * *)
# Format:  second minute hour day-of-month month day-of-week
# To run every hour:       0 0 * * * *
# To run every 30 minutes: 0 */30 * * * *
ci3.sync.cron=0 0 0 * * *